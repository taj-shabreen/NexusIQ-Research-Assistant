  <text x="800" y="338" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#A8B5E0" letter-spacing="0.3">Advanced Research RAG Assistant</text>

