<svg width="1600" height="600" viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="55%" stop-color="#141B33"/>
      <stop offset="100%" stop-color="#1B2240"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C9CFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7C9CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DD4BF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C9CFF"/>
      <stop offset="50%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.015"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C9CFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C9CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <circle cx="1340" cy="120" r="320" fill="url(#glowA)"/>
  <circle cx="200" cy="500" r="280" fill="url(#glowB)"/>
  <circle cx="800" cy="560" r="260" fill="url(#glowC)"/>

  <!-- ============ background neural / retrieval graph network ============ -->
  <g stroke="#7C9CFF" stroke-width="0.6" opacity="0.28" fill="none">
    <path d="M 90 80 L 210 130 L 180 240"/>
    <path d="M 210 130 L 340 90"/>
    <path d="M 180 240 L 90 320"/>
    <path d="M 90 320 L 60 440"/>
    <path d="M 180 240 L 300 280"/>
    <path d="M 300 280 L 340 90"/>
  </g>
  <g stroke="#2DD4BF" stroke-width="0.6" opacity="0.26" fill="none">
    <path d="M 1230 90 L 1360 70 L 1480 140"/>
    <path d="M 1360 70 L 1400 180"/>
    <path d="M 1480 140 L 1520 250"/>
    <path d="M 1400 180 L 1480 140"/>
    <path d="M 1230 90 L 1180 200"/>
    <path d="M 1180 200 L 1400 180"/>
  </g>
  <g stroke="#A78BFA" stroke-width="0.6" opacity="0.24" fill="none">
    <path d="M 1180 470 L 1300 430 L 1420 480"/>
    <path d="M 1300 430 L 1340 530"/>
    <path d="M 1180 470 L 1110 540"/>
    <path d="M 1420 480 L 1500 520"/>
  </g>

  <!-- nodes for graphs above -->
  <g fill="#7C9CFF">
    <circle cx="90" cy="80" r="3"/><circle cx="210" cy="130" r="3.5"/><circle cx="340" cy="90" r="3"/>
    <circle cx="180" cy="240" r="4"/><circle cx="90" cy="320" r="3"/><circle cx="60" cy="440" r="3"/>
    <circle cx="300" cy="280" r="3"/>
  </g>
  <g fill="#2DD4BF">
    <circle cx="1230" cy="90" r="3"/><circle cx="1360" cy="70" r="3.5"/><circle cx="1480" cy="140" r="4"/>
    <circle cx="1400" cy="180" r="3"/><circle cx="1520" cy="250" r="3"/><circle cx="1180" cy="200" r="3"/>
  </g>
  <g fill="#A78BFA">
    <circle cx="1180" cy="470" r="3"/><circle cx="1300" cy="430" r="3.5"/><circle cx="1420" cy="480" r="3"/>
    <circle cx="1340" cy="530" r="3"/><circle cx="1110" cy="540" r="3"/><circle cx="1500" cy="520" r="3"/>
  </g>

  <!-- circuit corner traces -->
  <g stroke="#7C9CFF" stroke-width="1" opacity="0.35" fill="none">
    <path d="M 40 40 L 110 40 L 110 90 L 170 90"/>
    <path d="M 40 560 L 100 560 L 100 510 L 160 510"/>
  </g>
  <g stroke="#2DD4BF" stroke-width="1" opacity="0.35" fill="none">
    <path d="M 1560 40 L 1490 40 L 1490 90 L 1430 90"/>
    <path d="M 1560 560 L 1500 560 L 1500 510 L 1440 510"/>
  </g>
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="40" cy="40" r="2.5"/><circle cx="170" cy="90" r="2.5"/>
    <circle cx="40" cy="560" r="2.5"/><circle cx="160" cy="510" r="2.5"/>
    <circle cx="1560" cy="40" r="2.5"/><circle cx="1430" cy="90" r="2.5"/>
    <circle cx="1560" cy="560" r="2.5"/><circle cx="1440" cy="510" r="2.5"/>
  </g>

  <!-- vector embedding tick marks, scattered -->
  <g stroke="#5B6B96" stroke-width="1" opacity="0.4">
    <line x1="430" y1="60" x2="430" y2="76"/>
    <line x1="446" y1="64" x2="446" y2="76"/>
    <line x1="462" y1="58" x2="462" y2="76"/>
    <line x1="1100" y1="540" x2="1100" y2="556"/>
    <line x1="1116" y1="536" x2="1116" y2="556"/>
    <line x1="1132" y1="544" x2="1132" y2="556"/>
  </g>

  <!-- ============ central glass panel ============ -->
  <rect x="300" y="170" width="1000" height="260" rx="20" fill="url(#panel)" stroke="#7C9CFF" stroke-width="1" stroke-opacity="0.25"/>
  <rect x="300" y="170" width="1000" height="260" rx="20" fill="none" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- retrieval graph motif centered above title, inside panel -->
  <g stroke="url(#accent)" stroke-width="1" opacity="0.55" fill="none">
    <path d="M 700 210 L 760 195"/>
    <path d="M 760 195 L 820 210"/>
    <path d="M 760 195 L 760 178"/>
    <path d="M 840 210 L 880 195 L 920 210"/>
  </g>
  <g fill="#2DD4BF">
    <circle cx="700" cy="210" r="3"/><circle cx="760" cy="195" r="3.5"/><circle cx="760" cy="178" r="3"/>
    <circle cx="820" cy="210" r="3"/><circle cx="840" cy="210" r="3"/><circle cx="880" cy="195" r="3"/><circle cx="920" cy="210" r="3"/>
  </g>

  <!-- title -->
  <text x="800" y="300" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">NexusIQ</text>
  <text x="800" y="338" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#A8B5E0" letter-spacing="0.3">Advanced Research RAG Assistant</text>

  <rect x="660" y="356" width="280" height="2.5" rx="1.25" fill="url(#accent)"/>

  <text x="800" y="395" text-anchor="middle" font-family="'JetBrains Mono', Consolas, monospace" font-size="14" fill="#7C9CFF" letter-spacing="1.5">HYBRID RETRIEVAL  ·  EVALUATION  ·  DEBUGGING  ·  PRODUCTION AI</text>

  <!-- bottom hairline -->
  <rect x="0" y="598" width="1600" height="2" fill="url(#accent)" opacity="0.4"/>
</svg>
